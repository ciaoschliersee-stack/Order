<!DOCTYPE html>
<html lang="de">
<head>
 <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gastro Bestell-App</title>
 <style>
 :root { --primary: #2c3e50; --accent: #e74c3c; --success: #2ecc71; --bg: #f8f9fa; --color-frische: #e6f4ea; --color-trocken: #fef7e0; --color-saucen: #fce8e6; --color-nonfood: #e8f0fe; --color-reinigung: #f3e8fd; --border-frische: #34a853; --border-trocken: #fbbc05; --border-saucen: #ea4335; --border-nonfood: #4285f4; --border-reinigung: #a142f4; }
 body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
 .container { max-width: 650px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
 h1 { font-size: 24px; color: var(--primary); margin: 0 0 5px 0; }
 .meta-info { font-size: 14px; color: #666; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
 input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
 input[type="text"] { width: 100%; margin-bottom: 15px; }
 .add-box { margin-top: 25px; padding: 15px; background: #f1f3f4; border-radius: 8px; }
 .add-row { display: flex; gap: 8px; margin-top: 8px; }
 .add-row input { margin-bottom: 0; flex: 1; }
 button { padding: 12px 20px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
 .btn-add { background: var(--primary); color: white; }
 .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #edf2f7; border-left: 6px solid #ccc; border-radius: 4px 8px 8px 4px; margin-bottom: 8px; }
 .cat-frische { background: var(--color-frische); border-left-color: var(--border-frische); }
 .cat-trocken { background: var(--color-trocken); border-left-color: var(--border-trocken); }
 .cat-saucen { background: var(--color-saucen); border-left-color: var(--border-saucen); }
 .cat-nonfood { background: var(--color-nonfood); border-left-color: var(--border-nonfood); }
 .cat-reinigung { background: var(--color-reinigung); border-left-color: var(--border-reinigung); }
 .item-name { font-weight: bold; font-size: 16px; }
 .qty-controls { display: flex; align-items: center; gap: 12px; }
 .btn-qty { background: white; border: 1px solid #ccc; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; }
 .qty-val { min-width: 25px; text-align: center; font-weight: bold; font-size: 18px; }
 .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
 .btn-action { flex: 1; padding: 15px; font-size: 16px; }
 .btn-print { background: var(--success); color: white; }
 .btn-reset { background: var(--accent); color: white; }
 @media print { .search-box, .add-box, .qty-controls button, .action-buttons { display: none !important; } .item-row { border: none !important; border-bottom: 1px solid #000 !important; } .item-row:has(.qty-val[data-qty="0"]) { display: none !important; } }
 </style>
</head>
<body>
<div class="container">
 <h1>Gastro Einkauf &amp; Bestellung</h1>
 <div class="meta-info"><span>Standort: Camping</span><br><span id="live-clock">Datum/Uhrzeit...</span></div>
 <input type="text" id="search-input" placeholder="Artikel filtern..." oninput="filterArticles()">
 <div id="article-container"></div>
 <div class="add-box">
  <strong>Neuen Artikel für ALLE Mitarbeiter lernen:</strong>
  <div class="add-row">
   <input type="text" id="new-item-name" placeholder="Artikelname...">
   <select id="new-item-category">
    <option value="frische">Frische / TK / Kühlung</option><option value="trocken">Trockenlager</option><option value="saucen">Saucen / Gewürze</option><option value="nonfood">Verpackung</option><option value="reinigung">Reinigung</option>
   </select>
   <button class="btn-add" id="btn-add-submit" onclick="addNewArticle()">+</button>
  </div>
 </div>
 <div class="action-buttons">
  <button class="btn-action btn-reset" onclick="resetQuantities()">Mengen löschen (Reset)</button>
  <button class="btn-action btn-print" onclick="window.print()">Drucken / PDF</button>
 </div>
</div>
<script>
 const GOOGLE_SCRIPT_URL = "https://google.com";
 const categoryOrder = ["frische", "trocken", "saucen", "nonfood", "reinigung"];
 let orderQuantities = {};
 let currentArticles = [
   { name: "Polpa", cat: "frische", qty: 0 }, { name: "Mozzarella Pizza", cat: "frische", qty: 0 }, { name: "Mozzarella caprese", cat: "frische", qty: 0 }, { name: "Salami (vorbestellen 3 Tage früher)", cat: "frische", qty: 0 }, { name: "Garnelen", cat: "frische", qty: 0 }, { name: "Grillgemüse", cat: "frische", qty: 0 }, { name: "Avocado", cat: "frische", qty: 0 }, { name: "Hähnchenstreifen", cat: "frische", qty: 0 }, { name: "Pommes", cat: "frische", qty: 0 }, { name: "Bacon", cat: "frische", qty: 0 }, { name: "Eier", cat: "frische", qty: 0 }, { name: "Gorgonzola", cat: "frische", qty: 0 }, { name: "Grana", cat: "frische", qty: 0 }, { name: "Cheddar", cat: "frische", qty: 0 }, { name: "Sahne", cat: "frische", qty: 0 }, { name: "Knoblauch tk", cat: "frische", qty: 0 }, { name: "Farina", cat: "trocken", qty: 0 }, { name: "Semola", cat: "trocken", qty: 0 }, { name: "Hamburger", cat: "trocken", qty: 0 }, { name: "Veggy burger", cat: "trocken", qty: 0 }, { name: "Croutons", cat: "trocken", qty: 0 }, { name: "Mais", cat: "trocken", qty: 0 }, { name: "Röstzwiebeln", cat: "trocken", qty: 0 }, { name: "Öl", cat: "saucen", qty: 0 }, { name: "Olivenöl", cat: "saucen", qty: 0 }, { name: "Salz", cat: "saucen", qty: 0 }, { name: "Pommessalz", cat: "saucen", qty: 0 }, { name: "Pfeffer", cat: "saucen", qty: 0 }, { name: "Burger sauce", cat: "saucen", qty: 0 }, { name: "Trüffelcreme", cat: "saucen", qty: 0 }, { name: "Pesto", cat: "saucen", qty: 0 }, { name: "Mayo", cat: "saucen", qty: 0 }, { name: "Ketchup", cat: "saucen", qty: 0 }, { name: "Balsamico Creme", cat: "saucen", qty: 0 }, { name: "Balsamico dressing", cat: "saucen", qty: 0 }, { name: "French dressing", cat: "saucen", qty: 0 }, { name: "Verpackung Pasta", cat: "nonfood", qty: 0 }, { name: "Verpackung Pizza", cat: "nonfood", qty: 0 }, { name: "Verpackung Burger (vorbestellen)", cat: "nonfood", qty: 0 }, { name: "Pommes tüten gross", cat: "nonfood", qty: 0 }, { name: "Pommes tüten klein", cat: "nonfood", qty: 0 }, { name: "Frischhaltefolie", cat: "nonfood", qty: 0 }, { name: "Servietten", cat: "nonfood", qty: 0 }, { name: "Küchentücher", cat: "nonfood", qty: 0 }, { name: "Fettlöser", cat: "reinigung", qty: 0 }, { name: "Grillreiniger", cat: "reinigung", qty: 0 }, { name: "Spülmittel", cat: "reinigung", qty: 0 }, { name: "Handschuhe M", cat: "reinigung", qty: 0 }, { name: "Handschuhe L", cat: "reinigung", qty: 0 }, { name: "Handschuhe XL", cat: "reinigung", qty: 0 }, { name: "Lappen", cat: "reinigung", qty: 0 }, { name: "Schwamm", cat: "reinigung", qty: 0 }
 ];
 function updateClock() { document.getElementById('live-clock').innerText = "Datum/Uhrzeit: " + new Date().toLocaleString('de-DE'); }
 setInterval(updateClock, 1000); updateClock();
 function renderList() {
  currentArticles.sort((a, b) => categoryOrder.indexOf(a.cat) - categoryOrder.indexOf(b.cat));
  const container = document.getElementById('article-container'); container.innerHTML = '';
  currentArticles.forEach((item, index) => {
   var row = document.createElement('div'); row.className = `item-row cat-${item.cat}`; row.setAttribute('data-name', item.name.toLowerCase());
   row.innerHTML = `<div class="item-name">${item.name}</div><div class="qty-controls"><button class="btn-qty" onclick="changeQty('${item.name}',-1,${index})">-</button><span class="qty-val" id="qty-${index}" data-qty="${item.qty}">${item.qty}</span><button class="btn-qty" onclick="changeQty('${item.name}',1,${index})">+</button></div>`;
   container.appendChild(row);
  });
 }
 async function changeQty(itemName, change, index) {
  var targetItem = currentArticles.find(a => a.name === itemName); if (!targetItem) return;
  targetItem.qty = Math.max(0, targetItem.qty + change);
  document.getElementById(`qty-${index}`).innerText = targetItem.qty;
  document.getElementById(`qty-${index}`).setAttribute('data-qty', targetItem.qty);
  try { await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "updateQty", name: targetItem.name, qty: targetItem.qty }) }); } catch(e){}
 }
 async function resetQuantities() {
  if (confirm("Wirklich alle Live-Mengen auf 0 setzen?")) {
    currentArticles.forEach(a => a.qty = 0); renderList();
    try { await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "resetAll" }) }); } catch(e){}
  }
 }
 function filterArticles() {
  const query = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('.item-row').forEach(row => { row.style.display = row.getAttribute('data-name').includes(query) ? 'flex' : 'none'; });
 }
 async function addNewArticle() {
  const input = document.getElementById('new-item-name'); const name = input.value.trim();
  const cat = document.getElementById('new-item-category').value;
  if (!name || currentArticles.some(item => item.name.toLowerCase() === name.toLowerCase())) return;
  document.getElementById('btn-add-submit').disabled = true;
  try {
   await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "add", name: name, cat: cat }) });
   currentArticles.push({ name: name, cat: cat, qty: 0 }); renderList(); input.value = '';
  } catch (e) { alert("Fehler"); } finally { document.getElementById('btn-add-submit').disabled = false; }
 }
 renderList();
 async function loadArticlesFromCloud() {
  try {
   const response = await fetch(GOOGLE_SCRIPT_URL); const data = await response.json();
   if(data && data.length > 0) {
     data.forEach(cloudItem => {
