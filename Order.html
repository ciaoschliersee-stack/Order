<!DOCTYPE html>
<html lang="de">
<head>
 <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gastro Bestell-App</title>
 <style>
 :root { --primary: #2c3e50; --accent: #e74c3c; --success: #2ecc71; --whatsapp: #25D366; --bg: #f8f9fa; --color-frische: #e6f4ea; --color-trocken: #fef7e0; --color-saucen: #fce8e6; --color-nonfood: #e8f0fe; --color-reinigung: #f3e8fd; --border-frische: #34a853; --border-trocken: #fbbc05; --border-saucen: #ea4335; --border-nonfood: #4285f4; --border-reinigung: #a142f4; }
 body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
 .container { max-width: 650px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
 h1 { font-size: 24px; color: var(--primary); margin: 0 0 5px 0; }
 .meta-info { font-size: 14px; color: #666; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
 input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; width: 100%; margin-bottom: 15px; }
 .item-list { margin-top: 10px; padding-right: 5px; }
 .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #edf2f7; border-left: 6px solid #ccc; border-radius: 4px 8px 8px 4px; margin-bottom: 8px; }
 .cat-frische { background: var(--color-frische); border-left-color: var(--border-frische); }
 .cat-trocken { background: var(--color-trocken); border-left-color: var(--border-trocken); }
 .cat-saucen { background: var(--color-saucen); border-left-color: var(--border-saucen); }
 .cat-nonfood { background: var(--color-nonfood); border-left-color: var(--border-nonfood); }
 .cat-reinigung { background: var(--color-reinigung); border-left-color: var(--border-reinigung); }
 .item-name { font-weight: bold; font-size: 16px; }
 .qty-controls { display: flex; align-items: center; gap: 12px; }
 .btn-qty { background: white; border: 1px solid #ccc; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; }
 .qty-val { min-width: 25px; text-align: center; font-weight: bold; font-size: 18px; }
 .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
 .btn-action { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: center; box-sizing: border-box; }
 .btn-print { background: var(--success); }
 .btn-whatsapp { background: var(--whatsapp); }
 .btn-reset { background: var(--accent); }
 @media print { .search-box, .qty-controls button, .action-buttons { display: none !important; } .item-row { border: none !important; border-bottom: 1px solid #000 !important; } .item-row:has(.qty-val[data-qty="0"]) { display: none !important; } }
 </style>
</head>
<body>
<div class="container">
 <h1>Gastro Einkauf &amp; Bestellung</h1>
 <div class="meta-info"><span>Standort: Camping</span><br><span id="live-clock">Datum/Uhrzeit...</span></div>
 <input type="text" id="search-input" placeholder="Artikel filtern..." oninput="filterArticles()">
 <div id="article-container"></div>
 <div class="action-buttons">
  <button class="btn-action btn-whatsapp" onclick="sendWhatsApp()">Per WhatsApp senden</button>
  <button class="btn-action btn-print" onclick="window.print()">Als PDF speichern / Drucken</button>
  <button class="btn-action btn-reset" onclick="resetQuantities()">Mengen löschen (Reset)</button>
 </div>
</div>
<script>
 const categoryOrder = ["frische", "trocken", "saucen", "nonfood", "reinigung"];
 let orderQuantities = {};
 let currentArticles = [
   { name: "Polpa", cat: "frische" }, { name: "Mozzarella Pizza", cat: "frische" }, { name: "Mozzarella caprese", cat: "frische" }, { name: "Salami (vorbestellen 3 Tage früher)", cat: "frische" }, { name: "Garnelen", cat: "frische" }, { name: "Grillgemüse", cat: "frische" }, { name: "Avocado", cat: "frische" }, { name: "Hähnchenstreifen", cat: "frische" }, { name: "Pommes", cat: "frische" }, { name: "Bacon", cat: "frische" }, { name: "Eier", cat: "frische" }, { name: "Gorgonzola", cat: "frische" }, { name: "Grana", cat: "frische" }, { name: "Cheddar", cat: "frische" }, { name: "Sahne", cat: "frische" }, { name: "Knoblauch tk", cat: "frische" }, { name: "Farina", cat: "trocken" }, { name: "Semola", cat: "trocken" }, { name: "Hamburger", cat: "trocken" }, { name: "Veggy burger", cat: "trocken" }, { name: "Croutons", cat: "trocken" }, { name: "Mais", cat: "trocken" }, { name: "Röstzwiebeln", cat: "trocken" }, { name: "Öl", cat: "saucen" }, { name: "Olivenöl", cat: "saucen" }, { name: "Salz", cat: "saucen" }, { name: "Pommessalz", cat: "saucen" }, { name: "Pfeffer", cat: "saucen" }, { name: "Burger sauce", cat: "saucen" }, { name: "Trüffelcreme", cat: "saucen" }, { name: "Pesto", cat: "saucen" }, { name: "Mayo", cat: "saucen" }, { name: "Ketchup", cat: "saucen" }, { name: "Balsamico Creme", cat: "saucen" }, { name: "Balsamico dressing", cat: "saucen" }, { name: "French dressing", cat: "saucen" }, { name: "Verpackung Pasta", cat: "nonfood" }, { name: "Verpackung Pizza", cat: "nonfood" }, { name: "Verpackung Burger (vorbestellen)", cat: "nonfood" }, { name: "Pommes tüten gross", cat: "nonfood" }, { name: "Pommes tüten klein", cat: "nonfood" }, { name: "Frischhaltefolie", cat: "nonfood" }, { name: "Servietten", cat: "nonfood" }, { name: "Küchentücher", cat: "nonfood" }, { name: "Fettlöser", cat: "reinigung" }, { name: "Grillreiniger", cat: "reinigung" }, { name: "Spülmittel", cat: "reinigung" }, { name: "Handschuhe M", cat: "reinigung" }, { name: "Handschuhe L", cat: "reinigung" }, { name: "Handschuhe XL", cat: "reinigung" }, { name: "Lappen", cat: "reinigung" }, { name: "Schwamm", cat: "reinigung" }
 ];

 function updateClock() { document.getElementById('live-clock').innerText = "Datum/Uhrzeit: " + new Date().toLocaleString('de-DE'); }
 setInterval(updateClock, 1000); updateClock();

 function renderList() {
  currentArticles.sort((a, b) => categoryOrder.indexOf(a.cat) - categoryOrder.indexOf(b.cat));
  const container = document.getElementById('article-container'); container.innerHTML = '';
  currentArticles.forEach((item, index) => {
   const qty = orderQuantities[item.name] || 0;
   var row = document.createElement('div'); row.className = `item-row cat-${item.cat}`; row.setAttribute('data-name', item.name.toLowerCase());
   row.innerHTML = `<div class="item-name">${item.name}</div><div class="qty-controls"><button class="btn-qty" onclick="changeQty('${item.name}',-1,${index})">-</button><span class="qty-val" id="qty-${index}" data-qty="${qty}">${qty}</span><button class="btn-qty" onclick="changeQty('${item.name}',1,${index})">+</button></div>`;
   container.appendChild(row);
  });
 }

 function changeQty(itemName, change, index) {
  orderQuantities[itemName] = Math.max(0, (orderQuantities[itemName] || 0) + change);
  const qtySpan = document.getElementById(`qty-${index}`);
  qtySpan.innerText = orderQuantities[itemName];
  qtySpan.setAttribute('data-qty', orderQuantities[itemName]);
 }

 function sendWhatsApp() {
  let text = "GASTRO BESTELLUNG - CAMPING\nDatum: " + new Date().toLocaleString('de-DE') + "\n\n";
  let hatArtikel = false;
  
  currentArticles.forEach(item => {
    const qty = orderQuantities[item.name] || 0;
    if (qty > 0) {
      text += qty + "x " + item.name + "\n";
      hatArtikel = true;
    }
  });
  
  if (!hatArtikel) {
    alert("Bitte tragen Sie zuerst eine Menge ein!");
    return;
  }
  
  // Garantiert plattformunabhängiger WhatsApp-Link
  var waUrl = "https://wa.me" + encodeURIComponent(text);
  window.open(waUrl, '_blank');
 }

 function resetQuantities() {
  if (confirm("Wirklich alle Mengen auf 0 setzen?")) { orderQuantities = {}; renderList(); }
 }

 function filterArticles() {
  const query = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('.item-row').forEach(row => { row.style.display = row.getAttribute('data-name').includes(query) ? 'flex' : 'none'; });
 }

 renderList();
</script>
</body>
</html>
